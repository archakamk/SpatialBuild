<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpatialBuild — Gaussian Splat Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:#fff}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:12px;left:12px;z-index:10;pointer-events:none;
     background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border-radius:8px;padding:10px 14px;
     font-size:13px;line-height:1.6;max-width:300px}
#hud b{color:#6cf}
#controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
          display:flex;gap:8px;pointer-events:auto}
#controls button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
                 color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;
                 backdrop-filter:blur(6px);transition:.15s}
#controls button:hover{background:rgba(255,255,255,.25)}
#controls button.active{background:rgba(100,200,255,.3);border-color:#6cf}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
         background:#111;z-index:100;font-size:18px;flex-direction:column;gap:12px}
#loading .bar{width:260px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);overflow:hidden}
#loading .bar div{height:100%;width:0%;background:#6cf;transition:width .3s}
</style>
</head>
<body>

<!-- loading overlay -->
<div id="loading">
  <div>Loading splat …</div>
  <div class="bar"><div id="loadbar"></div></div>
  <div id="loadpct" style="font-size:13px;opacity:.6">0 %</div>
</div>

<!-- HUD -->
<div id="hud">
  <div><b>FPS:</b> <span id="fps">--</span></div>
  <div><b>Pos:</b> <span id="campos">--</span></div>
  <div><b>Gaussians:</b> <span id="ngauss">--</span></div>
  <div style="margin-top:4px;font-size:11px;opacity:.5">WASD/arrows = move · mouse = orbit · scroll = zoom</div>
</div>

<!-- Toggle buttons -->
<div id="controls">
  <!--__BEFORE_AFTER_TOGGLE__-->
  <!--__FURNITURE_BUTTONS__-->
</div>

<!-- ═══ Three.js + splat renderer ═══ -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── Config injected by step4_viewer.py ──
const SPLAT_URL = '/*__SPLAT_FILE__*/';
const FURNITURE_URLS = [/*__FURNITURE_LIST__*/];

// ── Renderer setup ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.Fog(0x111111, 50, 200);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 2, 5);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// ── Controls ──
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// ── WASD movement ──
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup',   e => keys[e.code] = false);

function updateMovement(dt) {
  const speed = 5 * dt;
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  const right = new THREE.Vector3().crossVectors(dir, camera.up).normalize();
  if (keys['KeyW'] || keys['ArrowUp'])    { camera.position.addScaledVector(dir, speed); controls.target.addScaledVector(dir, speed); }
  if (keys['KeyS'] || keys['ArrowDown'])   { camera.position.addScaledVector(dir, -speed); controls.target.addScaledVector(dir, -speed); }
  if (keys['KeyA'] || keys['ArrowLeft'])   { camera.position.addScaledVector(right, -speed); controls.target.addScaledVector(right, -speed); }
  if (keys['KeyD'] || keys['ArrowRight'])  { camera.position.addScaledVector(right, speed); controls.target.addScaledVector(right, speed); }
  if (keys['KeyQ'] || keys['Space'])       { camera.position.y += speed; controls.target.y += speed; }
  if (keys['KeyE'] || keys['ShiftLeft'])   { camera.position.y -= speed; controls.target.y -= speed; }
}

// ── Load .ply as coloured point cloud ──
const loader = new PLYLoader();
const loadingEl = document.getElementById('loading');
const loadbar  = document.getElementById('loadbar');
const loadpct  = document.getElementById('loadpct');

loader.load(
  SPLAT_URL,
  geometry => {
    geometry.computeVertexNormals();
    const nPoints = geometry.attributes.position.count;
    document.getElementById('ngauss').textContent = nPoints.toLocaleString();

    let material;
    if (geometry.attributes.color) {
      material = new THREE.PointsMaterial({ size: 0.012, vertexColors: true, sizeAttenuation: true });
    } else {
      material = new THREE.PointsMaterial({ size: 0.012, color: 0x6699ff, sizeAttenuation: true });
    }

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // Auto-center camera on the point cloud
    geometry.computeBoundingBox();
    const box = geometry.boundingBox;
    const center = new THREE.Vector3();
    box.getCenter(center);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);

    controls.target.copy(center);
    camera.position.copy(center).add(new THREE.Vector3(0, maxDim * 0.3, maxDim * 0.8));
    controls.update();

    loadingEl.style.display = 'none';
  },
  xhr => {
    if (xhr.total) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      loadbar.style.width = pct + '%';
      loadpct.textContent = pct + ' %';
    }
  },
  err => {
    loadpct.textContent = 'Failed to load splat: ' + err.message;
    console.error(err);
  }
);

// ── Load furniture .glb meshes ──
const gltfLoader = new GLTFLoader();
const furnitureGroup = new THREE.Group();
scene.add(furnitureGroup);

FURNITURE_URLS.forEach((url, i) => {
  gltfLoader.load(url, gltf => {
    const model = gltf.scene;
    model.position.set(i * 2, 0, 0);
    model.scale.setScalar(1.0);
    furnitureGroup.add(model);
  });
});

// ── Grid helper (subtle) ──
const grid = new THREE.GridHelper(40, 40, 0x333333, 0x222222);
grid.position.y = -0.01;
scene.add(grid);

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render loop ──
let frameTimes = [];
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  updateMovement(dt);
  controls.update();
  renderer.render(scene, camera);

  // FPS counter
  const now = performance.now();
  frameTimes.push(now);
  while (frameTimes.length > 0 && frameTimes[0] < now - 1000) frameTimes.shift();
  document.getElementById('fps').textContent = frameTimes.length;
  const p = camera.position;
  document.getElementById('campos').textContent = `${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
}
animate();
</script>
</body>
</html>
